{% extends "base.html" %}

{% block title %}Create Assignment - EduMind AI{% endblock %}
{% block page_title %}Create Assignment{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0"><i class="fas fa-plus-circle me-2"></i>Create New Assignment</h5>
            </div>
            <div class="card-body">
                <p class="text-muted">
                    <strong>Module:</strong> {{ module.title }}
                </p>
                
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Assignment Title</label>
                        <input type="text" name="title" class="form-control" required placeholder="Enter assignment title">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3" placeholder="Enter assignment description (optional)"></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Due Date</label>
                                <input type="date" name="due_date" class="form-control">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Max Score</label>
                                <input type="number" name="max_score" class="form-control" value="100" min="1">
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Instruction File (Optional)</label>
                        <input type="file" name="instruction_file" class="form-control" accept=".pdf,.doc,.docx,.txt,.rtf">
                        <small class="text-muted">Upload PDF or document with instructions</small>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save me-1"></i> Create Assignment
                        </button>
                        <a href="/lecturer/modules/{{ module.id }}/materials" class="btn btn-secondary">
                            <i class="fas fa-times me-1"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
