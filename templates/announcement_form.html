{% extends "base.html" %}

{% block title %}Post Announcement - EduMind AI{% endblock %}
{% block page_title %}Post Announcement{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-white">
                <h5 class="mb-0"><i class="bi bi-megaphone me-2"></i>Post Announcement</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Title <span class="text-danger">*</span></label>
                        <input type="text" name="title" class="form-control" required placeholder="Announcement title">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Message <span class="text-danger">*</span></label>
                        <textarea name="message_text" class="form-control" rows="5" required placeholder="Write your announcement..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary"><i class="bi bi-send me-2"></i>Post Announcement</button>
                    <a href="/courses/{{ course_id }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
