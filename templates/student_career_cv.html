{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="fas fa-file-upload"></i> Upload CV</h4>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label">CV Title</label>
                            <input type="text" name="title" class="form-control" required
                                   placeholder="e.g., Software Developer CV">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Professional Summary</label>
                            <textarea name="summary" class="form-control" rows="3"
                                      placeholder="Brief summary of your skills and experience..."></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Education</label>
                            <textarea name="education" class="form-control" rows="3"
                                      placeholder="Degree, Institution, Year..."></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Work Experience</label>
                            <textarea name="experience" class="form-control" rows="4"
                                      placeholder="Job title, Company, Duration, Key responsibilities..."></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Upload CV File (PDF/DOCX)</label>
                            <input type="file" name="cv_file" class="form-control" accept=".pdf,.docx,.doc">
                        </div>
                        
                        <div class="alert alert-info">
                            <i class="fas fa-robot"></i> <strong>AI Analysis:</strong> After uploading, our AI will analyze your CV and provide improvement suggestions.
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('student_career') }}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-upload"></i> Upload & Analyze
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
