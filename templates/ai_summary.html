{% extends "base.html" %}

{% block title %}AI Summary - EduMind AI{% endblock %}
{% block page_title %}AI Generated Summary{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-robot me-2 text-success"></i>AI Summary for: {{ material.title }}</h5>
                <a href="/courses/{{ material.course_id }}" class="btn btn-sm btn-outline-secondary">Back to Course</a>
            </div>
            <div class="card-body">
                <div class="bg-light p-4 rounded">
                    {{ summary }}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
